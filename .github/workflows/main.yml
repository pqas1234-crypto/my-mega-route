name: MegaRoute Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Final Map Fix
        run: |
          flutter create --overwrite .
          
          # 1. 補回網路權限設定 (解決灰屏關鍵)
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

          # 2. 寫入 pubspec.yaml
          cat <<EOF > pubspec.yaml
          name: megaroute_app
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            flutter_map: 7.0.2
            latlong2: 0.9.1
          flutter:
            uses-material-design: true
          EOF

          # 3. 寫入 main.dart (使用 HTTPS 確保連線不被封鎖)
          cat <<EOF > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:flutter_map/flutter_map.dart';
          import 'package:latlong2/latlong2.dart';

          void main() => runApp(MaterialApp(home: Scaffold(
            appBar: AppBar(title: Text('MegaRoute Map Working')),
            body: FlutterMap(
              options: MapOptions(
                initialCenter: LatLng(25.0337, 121.5646),
                initialZoom: 15.0,
              ),
              children: [
                TileLayer(
                  urlTemplate: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
                  userAgentPackageName: 'com.example.megaroute_app',
                ),
              ],
            ),
          )));
          EOF

          # 4. 編譯
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/megaroute.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: megaroute-apk
          path: output/megaroute.apk
