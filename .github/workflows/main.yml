name: MegaRoute Auto Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Hard-Fix and Build
        # 這裡設定全域變數，Mapbox 外掛會優先讀取這些名稱
        env:
          SDK_REGISTRY_TOKEN: pk.placeholder
          MAPBOX_DOWNLOADS_TOKEN: sk.placeholder
          MAPBOX_ACCESS_TOKEN: pk.placeholder
        run: |
          # A. 初始化地基
          flutter create .
          
          # B. 寫入 gradle.properties 強制關閉 AGP 9 的嚴格檢查
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          echo "android.nonTransitiveRClass=false" >> android/gradle.properties
          echo "android.nonFinalResIds=false" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # C. 針對 Mapbox GL 的特殊處理：建立 gradle 初始化腳本
          # 這會強行在 Gradle 啟動時塞入 Token
          mkdir -p ~/.gradle
          echo "allprojects { project.ext.set('SDK_REGISTRY_TOKEN', 'pk.placeholder') }" > ~/.gradle/init.gradle
          
          # D. 執行編譯 (加上無視圖標錯誤參數)
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
          # E. 移動成品
          mkdir -p /output
          cp build/app/outputs/flutter-apk/app-release.apk /output/megaroute.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: megaroute-final-apk
          path: output/megaroute.apk
