name: MegaRoute Auto Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Force Patch and Build
        env:
          SDK_REGISTRY_TOKEN: pk.placeholder
        run: |
          # A. 初始化
          flutter create .
          flutter pub get
          
          # B. 直接對已知路徑注入 Namespace (不使用變數以避免語法報錯)
          # 這是從報錯 Log 中提取的絕對路徑
          TARGET_FILE="/home/runner/.pub-cache/hosted/pub.dev/mapbox_gl-0.16.0/android/build.gradle"
          
          echo "Applying patch to \"
          
          # 檢查檔案是否存在，存在就直接用 sed 插入
          [ -f "\" ] && sed -i '/android {/a \    namespace "com.mapbox.mapboxgl"' "\" && echo "Patch applied!"
          
          # C. 編譯配置與環境變數
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          mkdir -p ~/.gradle
          echo "allprojects { project.ext.set('SDK_REGISTRY_TOKEN', 'pk.placeholder') }" > ~/.gradle/init.gradle
          
          # D. 執行編譯
          flutter build apk --release --no-tree-shake-icons
          
          # E. 整理產出物
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/megaroute.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: megaroute-final-apk
          path: output/megaroute.apk
