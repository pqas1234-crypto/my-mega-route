name: MegaRoute Auto Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Force Flutter Structure Sync
        run: |
          # 移除 --force 參數，直接在當前目錄重建結構
          flutter create .
          flutter pub get
          flutter build apk --release
          
          mkdir -p /output
          cp build/app/outputs/flutter-apk/app-release.apk /output/megaroute.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: megaroute-final-apk
          path: output/megaroute.apk
