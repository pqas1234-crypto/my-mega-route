name: MegaRoute Auto Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build and Repair
        run: |
          # 修復 Gradle 版本
          find . -name "build.gradle" -exec sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.0.0/g' {} +
          flutter pub get
          flutter build apk --release
          mkdir -p /output
          cp build/app/outputs/flutter-apk/app-release.apk /output/megaroute.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: megaroute-app-file
          path: output/megaroute.apk
