name: MegaRoute Auto Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Ultimate Fix and Build
        env:
          SDK_REGISTRY_TOKEN: pk.placeholder
        run: |
          # A. 初始化地基
          flutter create .
          flutter pub get
          
          # B. 【關鍵修正】強制幫 mapbox_gl 套件補上缺失的 namespace
          # 這行會自動在快取目錄中找到該套件的 build.gradle 並注入命名空間
          MAPBOX_PATH=
          if [ -d "" ]; then
            sed -i '/android {/a \    namespace "com.mapbox.mapboxgl"' "/android/build.gradle"
            echo "Successfully patched mapbox_gl namespace"
          fi
          
          # C. 解決 AGP 8+ 相容性與 Token 問題
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          mkdir -p ~/.gradle
          echo "allprojects { project.ext.set('SDK_REGISTRY_TOKEN', 'pk.placeholder') }" > ~/.gradle/init.gradle
          
          # D. 執行編譯
          flutter build apk --release --no-tree-shake-icons
          
          # E. 移動成品
          mkdir -p /output
          cp build/app/outputs/flutter-apk/app-release.apk /output/megaroute.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: megaroute-final-apk
          path: output/megaroute.apk
