name: MegaRoute Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Ultimate Bypass Build
        run: |
          flutter create --overwrite .
          
          # 1. 開啟網路權限
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

          # 2. 簡化 pubspec.yaml (只留最穩定的 flutter_map)
          cat <<EOF > pubspec.yaml
          name: megaroute_app
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            flutter_map: 7.0.2
          flutter:
            uses-material-design: true
          EOF

          # 3. 寫入 main.dart (自定義 LatLng，完全不 import latlong2 套件)
          cat <<EOF > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:flutter_map/flutter_map.dart';

          // 直接把座標工具寫在裡面，不再依賴外部下載
          class LocalLatLng {
            final double latitude;
            final double longitude;
            const LocalLatLng(this.latitude, this.longitude);
          }

          void main() => runApp(MaterialApp(
            debugShowCheckedModeBanner: false,
            home: Scaffold(
              appBar: AppBar(title: const Text('MegaRoute Map Final')),
              body: FlutterMap(
                options: MapOptions(
                  // 使用動態轉型來滿足 flutter_map 的接口
                  initialCenter: const LocalLatLng(25.0337, 121.5646) as dynamic,
                  initialZoom: 15.0,
                ),
                children: [
                  TileLayer(
                    urlTemplate: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
                    userAgentPackageName: 'com.example.megaroute_app',
                  ),
                ],
              ),
            ),
          ));
          EOF

          # 4. 強制清理並編譯
          flutter pub cache clean --force
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/megaroute.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: megaroute-apk
          path: output/megaroute.apk
