name: MegaRoute Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Hard Reset Dependencies and Build
        run: |
          # 1. 修正 pubspec.yaml (補回 latlong2 並優化 flutter_map 版本)
          cat <<EOF > pubspec.yaml
          name: megaroute_app
          version: 1.0.0+1
          publish_to: 'none'
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            flutter_map: ^7.0.2  
            latlong2: ^0.9.1
          flutter:
            uses-material-design: true
          EOF

          # 2. 修正 main.dart (恢復正統 Import)
          cat <<EOF > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:flutter_map/flutter_map.dart';
          import 'package:latlong2/latlong2.dart';

          void main() => runApp(const MaterialApp(home: MegaRouteApp()));

          class MegaRouteApp extends StatelessWidget {
            const MegaRouteApp({super.key});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('MegaRoute Map Fix')),
                body: FlutterMap(
                  options: MapOptions(
                    // 這裡移除 const，讓它能正確讀取 latlong2 的類別
                    initialCenter: LatLng(25.0337, 121.5646),
                    initialZoom: 15.0,
                  ),
                  children: [
                    TileLayer(
                      urlTemplate: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
                      userAgentPackageName: 'com.example.megaroute_app',
                    ),
                  ],
                ),
              );
            }
          }
          EOF

          # 3. 補回網路權限到既存的 AndroidManifest.xml
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
              if ! grep -q "android.permission.INTERNET" android/app/src/main/AndroidManifest.xml; then
                  sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
              fi
          fi

          # 4. 強力刷新依賴 (關鍵動作)
          flutter pub cache clean --force
          flutter pub get
          
          # 5. 編譯
          flutter build apk --release --no-tree-shake-icons
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/megaroute.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: megaroute-apk
          path: output/megaroute.apk
