name: MegaRoute Auto Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Patch and Build
        env:
          SDK_REGISTRY_TOKEN: pk.placeholder
        run: |
          # A. 初始化
          flutter create .
          flutter pub get
          
          # B. 使用正確的轉義語法注入 Namespace
          # 我們使用 env 變數來傳遞路徑，避免 Shell 語法衝突
          PKG_PATH=
          echo "Found package at: "
          
          if [ -n "" ]; then
            # 在 android { 之後插入 namespace
            sed -i '/android {/a \    namespace "com.mapbox.mapboxgl"' "/android/build.gradle"
            echo "Namespace patch applied successfully."
          fi
          
          # C. 補上編譯配置
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          mkdir -p ~/.gradle
          echo "allprojects { project.ext.set('SDK_REGISTRY_TOKEN', 'pk.placeholder') }" > ~/.gradle/init.gradle
          
          # D. 開始編譯
          flutter build apk --release --no-tree-shake-icons
          
          # E. 成品搬運
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/megaroute.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: megaroute-final-apk
          path: output/megaroute.apk
