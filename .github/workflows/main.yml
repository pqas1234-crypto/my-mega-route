name: MegaRoute Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Hard Reset Dependencies and Build
        run: |
          # 1. 建立專案
          flutter create --overwrite .
          
          # 2. 強制寫入 pubspec (微調版本號觸發刷新)
          cat <<EOF > pubspec.yaml
          name: megaroute_app
          description: "MegaRoute Project"
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            flutter_map: 7.0.2
            latlong2: 0.9.1
            cupertino_icons: ^1.0.6
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0
          flutter:
            uses-material-design: true
          EOF
          
          # 3. 寫入程式碼
          cat <<EOF > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:flutter_map/flutter_map.dart';
          import 'package:latlong2/latlong2.dart';

          void main() => runApp(const MaterialApp(home: MegaRouteApp()));

          class MegaRouteApp extends StatelessWidget {
            const MegaRouteApp({super.key});
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('MegaRoute Map')),
                body: FlutterMap(
                  options: MapOptions(
                    initialCenter: LatLng(25.0330, 121.5654),
                    initialZoom: 13.0,
                  ),
                  children: [
                    TileLayer(
                      urlTemplate: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
                      userAgentPackageName: 'com.example.megaroute_app',
                    ),
                  ],
                ),
              );
            }
          }
          EOF
          
          # 4. 強力刷新套件 (這是解決 "No such file or directory" 的關鍵)
          flutter pub cache clean --force
          flutter pub get
          
          # 5. 編譯
          flutter build apk --release --no-tree-shake-icons
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/megaroute.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: megaroute-apk
          path: output/megaroute.apk
