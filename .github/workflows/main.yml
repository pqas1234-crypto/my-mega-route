name: MegaRoute Auto Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Force Flutter Upgrade and Build
        run: |
          # 在雲端強制升級專案結構
          flutter create . --force
          flutter pub get
          flutter build apk --release
          
          mkdir -p /output
          cp build/app/outputs/flutter-apk/app-release.apk /output/megaroute.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: megaroute-final-apk
          path: output/megaroute.apk
