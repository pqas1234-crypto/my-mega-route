name: MegaRoute Auto Build (FlutterMap)
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Build APK
        run: |
          # 這些指令會在 GitHub 的伺服器上跑，那裡有環境，所以不會報錯
          flutter create .
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/megaroute.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: megaroute-flutter-map-apk
          path: output/megaroute.apk
