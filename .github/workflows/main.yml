name: MegaRoute Auto Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Force Patch and Build
        env:
          SDK_REGISTRY_TOKEN: pk.placeholder
        run: |
          # A. 初始化
          flutter create .
          flutter pub get
          
          # B. 【核心修正】改用 find 指令全域搜索 mapbox_gl
          echo "Searching for mapbox_gl source..."
          MAPBOX_DIR=
          
          if [ -z "\" ]; then
            # 如果 find 找不到，嘗試直接指定常見路徑
            MAPBOX_DIR="/home/runner/.pub-cache/hosted/pub.dev/mapbox_gl-0.16.0"
          fi
          
          echo "Target Directory: \"
          
          # 檢查 build.gradle 是否存在並注入 namespace
          GRADLE_FILE="\/android/build.gradle"
          if [ -f "\" ]; then
            # 先檢查是否已經注入過，避免重複注入
            if ! grep -q "namespace" "\"; then
              sed -i '/android {/a \    namespace "com.mapbox.mapboxgl"' "\"
              echo "Patch successfully injected into \"
            else
              echo "Namespace already exists, skipping patch."
            fi
          else
            echo "ERROR: Could not find build.gradle at \"
          fi
          
          # C. 編譯配置與 Token
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          mkdir -p ~/.gradle
          echo "allprojects { project.ext.set('SDK_REGISTRY_TOKEN', 'pk.placeholder') }" > ~/.gradle/init.gradle
          
          # D. 執行編譯
          flutter build apk --release --no-tree-shake-icons
          
          # E. 成品搬運
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/megaroute.apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: megaroute-final-apk
          path: output/megaroute.apk
